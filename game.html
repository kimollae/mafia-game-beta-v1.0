<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#030609">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAFIA // PROTOCOL — OPERATION</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* ── RESET ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#00c8ff; --blue-dim:#005f7a;
  --red:#ff2244;  --red-dim:#6e0f1d;
  --amber:#ffb700;--amber-dim:#5a3f00;
  --green:#00ff88;
  --font-hud:'Orbitron',monospace;
  --font-mono:'Share Tech Mono',monospace;
  --font-body:'Rajdhani',sans-serif;
  /* 기본값 */
  --bg:#030609; --bg2:#070d12; --bg3:#0b1520;
  --border:#0e2233; --muted:#3a5566; --text:#c8dce8;
  --acc:#00c8ff; --acc-dim:#005f7a; --acc-glow:rgba(0,200,255,0.2);
  --scanline:rgba(0,200,255,0.035);
}

/* ★ 시민: 차가운 블루 — 홀로그램 수사 본부 */
body[data-team="citizen"] {
  --bg:#030609; --bg2:#060d14; --bg3:#091523;
  --border:#0a2840; --muted:#2d5066; --text:#b8ddf0;
  --acc:#00c8ff; --acc-dim:#005f7a; --acc-glow:rgba(0,200,255,0.18);
  --scanline:rgba(0,200,255,0.035);
}

/* ★ 마피아: 피빛 레드 — 다크웹 지하 조직 */
body[data-team="mafia"] {
  --bg:#080203; --bg2:#120508; --bg3:#1a0810;
  --border:#3a0d16; --muted:#5c1a25; --text:#f0c0c8;
  --acc:#ff2244; --acc-dim:#6e0f1d; --acc-glow:rgba(255,34,68,0.2);
  --scanline:rgba(255,34,68,0.04);
}

/* ★ 중립: 황금 앰버 — 비밀 카지노 딜러 */
body[data-team="neutral"] {
  --bg:#060501; --bg2:#0f0b02; --bg3:#181203;
  --border:#3a2d00; --muted:#5a4400; --text:#f0dfa0;
  --acc:#ffb700; --acc-dim:#5a3f00; --acc-glow:rgba(255,183,0,0.18);
  --scanline:rgba(255,183,0,0.04);
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;cursor:crosshair;transition:background 0.5s,color 0.5s}

/* scanlines */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);pointer-events:none;z-index:9000;transition:background 0.6s}

/* ── LAYOUT ─────────────────────────────────────────────────── */
#app{display:grid;grid-template-rows:56px 1fr;height:100vh;width:100vw}

/* ── HEADER ─────────────────────────────────────────────────── */
#header{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 16px;
  border-bottom:1px solid var(--border);
  background:rgba(3,6,9,0.9);
  backdrop-filter:blur(8px);
  position:relative;
  z-index:100;
}
.h-left{display:flex;align-items:center;gap:12px}
.h-right{display:flex;align-items:center;gap:8px;justify-content:flex-end}

/* 페이즈 타이머 */
#phase-block{text-align:center}
#phase-label{font-family:var(--font-hud);font-size:9px;letter-spacing:0.4em;color:var(--muted)}
#phase-timer{
  font-family:var(--font-hud);font-size:24px;font-weight:900;
  color:var(--acc);
  text-shadow:0 0 20px var(--acc-glow);
  letter-spacing:0.1em;
  line-height:1;
  transition:color 0.3s;
}
#phase-timer.urgent{color:var(--red);animation:timerPulse 0.5s ease-in-out infinite}
#phase-name{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.3em;margin-top:1px}

/* 직업 현황판 버튼 */
.h-btn{
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  padding:5px 10px;cursor:crosshair;transition:all 0.15s;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}
.h-btn:hover{border-color:var(--acc);color:var(--acc)}
.h-btn.danger:hover{border-color:var(--red);color:var(--red)}
.h-btn.active{border-color:var(--acc);color:var(--acc);background:var(--acc-glow)}

/* skip 게이지 */
#skip-wrap{display:flex;align-items:center;gap:6px}
#skip-gauge-wrap{width:60px;height:3px;background:var(--border);overflow:hidden}
#skip-gauge{height:100%;background:var(--acc);width:0;transition:width 0.2s}

/* 직업 현황 오버레이 */
#role-tracker{
  position:fixed;top:56px;right:0;width:260px;
  background:var(--bg2);border-left:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:16px;z-index:500;
  transform:translateX(100%);transition:transform 0.25s ease;
}
#role-tracker.open{transform:none}
.rt-title{font-family:var(--font-mono);font-size:9px;letter-spacing:0.3em;color:var(--muted);margin-bottom:12px}
.rt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rt-item{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:11px;color:var(--text);
  padding:5px 8px;border:1px solid var(--border);
}
.rt-item.dead{opacity:0.3;filter:grayscale(1)}
.rt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rt-dot.mafia{background:var(--red)} .rt-dot.citizen{background:var(--blue)} .rt-dot.neutral{background:var(--amber)}

/* ── MAIN ───────────────────────────────────────────────────── */
#main{display:grid;grid-template-columns:280px 1fr 300px;height:100%;overflow:hidden}

/* ── LEFT: 플레이어 그리드 ──────────────────────────────────── */
#player-grid{
  border-right:1px solid var(--border);
  background:var(--bg2);
  overflow-y:auto;
  padding:12px;
  display:flex;flex-direction:column;gap:8px;
  position:relative;
}
#player-grid::-webkit-scrollbar{width:3px}
#player-grid::-webkit-scrollbar-thumb{background:var(--border)}

.pg-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.3em;color:var(--muted);margin-bottom:4px;padding:0 4px}

/* 플레이어 카드 */
.p-card{
  border:1px solid var(--border);
  background:var(--bg3);
  padding:10px 12px;
  cursor:crosshair;
  transition:all 0.15s;
  position:relative;
  overflow:hidden;
  user-select:none;
}
.p-card::before{content:'';position:absolute;left:0;top:0;width:2px;height:0;background:var(--acc);transition:height 0.2s}
.p-card:hover{border-color:var(--acc-dim)} .p-card:hover::before{height:100%}
.p-card.dead{opacity:0.35;filter:grayscale(0.8)}
.p-card.me{border-color:var(--green)}
.p-card.targeted{border-color:var(--acc);box-shadow:0 0 12px var(--acc-glow);animation:targetPulse 1s ease-in-out infinite}
.p-card.vote-target{border-color:var(--red);box-shadow:0 0 8px rgba(255,34,68,0.3)}

.pc-top{display:flex;align-items:center;gap:8px}
.pc-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-hud);font-size:13px;font-weight:700;
  border:1px solid var(--acc-dim);background:var(--acc-glow);
  color:var(--acc);flex-shrink:0;
}
.pc-info{flex:1;min-width:0}
.pc-name{font-family:var(--font-mono);font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-status{font-size:10px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:4px}
.pc-wave{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite}
.pc-wave.offline{background:var(--muted);animation:none}

/* 태그 배지 */
.pc-tag{
  display:inline-block;font-family:var(--font-mono);font-size:9px;
  padding:1px 6px;border-radius:2px;margin-top:4px;
}
.tag-red{background:rgba(255,34,68,0.15);color:var(--red);border:1px solid var(--red-dim)}
.tag-blue{background:rgba(0,200,255,0.1);color:var(--blue);border:1px solid var(--blue-dim)}
.tag-amber{background:rgba(255,183,0,0.1);color:var(--amber);border:1px solid var(--amber-dim)}
.tag-clear{background:transparent;color:var(--muted);border:1px solid var(--border)}

/* 투표 수 표시 */
.pc-votes{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-family:var(--font-hud);font-size:16px;font-weight:900;
  color:var(--red);text-shadow:0 0 10px rgba(255,34,68,0.5);
}

/* 투표 레이저 라인 — SVG overlay */
#vote-overlay{position:absolute;inset:0;pointer-events:none;z-index:10}

/* 태그 컨텍스트 메뉴 */
#tag-menu{
  position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--border);padding:4px;
  display:none;
}
.tag-opt{
  font-family:var(--font-mono);font-size:11px;padding:6px 12px;cursor:crosshair;
  transition:background 0.1s;white-space:nowrap;
}
.tag-opt:hover{background:var(--bg3)}

/* ── CENTER: 채팅 ────────────────────────────────────────────── */
#chat-panel{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}

/* 탭 */
#chat-tabs{display:flex;border-bottom:1px solid var(--border)}
.c-tab{
  flex:1;font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;
  padding:10px;border:none;background:transparent;color:var(--muted);
  cursor:crosshair;border-bottom:2px solid transparent;transition:all 0.15s;
}
.c-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.c-tab.ghost-tab{color:var(--muted)}
.c-tab.ghost-tab.active{color:#a78bfa;border-bottom-color:#a78bfa}

/* 메시지 목록 */
#chat-log{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
#chat-log::-webkit-scrollbar{width:3px}
#chat-log::-webkit-scrollbar-thumb{background:var(--border)}

.msg{font-family:var(--font-mono);font-size:12px;line-height:1.6;padding:4px 8px;border-radius:2px;word-break:break-all}
.msg.system{
  color:var(--acc);background:var(--acc-glow);
  border-left:2px solid var(--acc);
  font-size:11px;
}
.msg.system.warn{color:var(--red);background:rgba(255,34,68,0.08);border-color:var(--red)}
.msg.system.success{color:var(--green);background:rgba(0,255,136,0.06);border-color:var(--green)}
.msg.system.amber{color:var(--amber);background:rgba(255,183,0,0.07);border-color:var(--amber)}
.msg.chat .sender{font-weight:600;margin-right:6px}
.msg.chat.me .sender{color:var(--green)}
.msg.chat.mafia-msg .sender{color:var(--red)}
.msg.chat.ghost-msg{color:#a78bfa;opacity:0.8}
.msg.chat .body{color:var(--text)}
.msg-time{font-size:9px;color:var(--muted);margin-left:6px;opacity:0.6}

/* 입력창 */
#chat-input-wrap{
  border-top:1px solid var(--border);padding:10px 12px;
  display:flex;gap:8px;align-items:center;
}
#chat-input{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:12px;
  padding:8px 12px;outline:none;transition:border-color 0.2s;
}
#chat-input:focus{border-color:var(--acc)}
#chat-input::placeholder{color:var(--muted)}
.chat-send{
  font-family:var(--font-hud);font-size:10px;letter-spacing:0.1em;
  border:1px solid var(--acc-dim);background:transparent;color:var(--acc);
  padding:8px 14px;cursor:crosshair;transition:all 0.15s;
}
.chat-send:hover{background:var(--acc-glow)}

/* 퀵 핑 */
#quick-ping{display:flex;gap:4px;padding:6px 12px;border-top:1px solid var(--border);overflow-x:auto}
#quick-ping::-webkit-scrollbar{display:none}
.qp-btn{
  font-family:var(--font-mono);font-size:9px;white-space:nowrap;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  padding:4px 8px;cursor:crosshair;transition:all 0.15s;flex-shrink:0;
}
.qp-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ── RIGHT: 개인 HUD ─────────────────────────────────────────── */
#hud{
  border-left:1px solid var(--border);
  background:var(--bg2);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ID 카드 */
#id-card{
  border-bottom:1px solid var(--border);
  padding:16px;
  background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);
  position:relative;overflow:hidden;
}
#id-card::after{
  content:'';position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:var(--acc-glow);filter:blur(20px);pointer-events:none;
}
.id-faction{font-family:var(--font-mono);font-size:9px;letter-spacing:0.4em;color:var(--acc);margin-bottom:8px}
.id-role-wrap{display:flex;align-items:center;gap:12px}
.id-icon{
  width:48px;height:48px;border:1px solid var(--acc-dim);background:var(--acc-glow);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
.id-text{}
.id-name{font-family:var(--font-hud);font-size:16px;font-weight:700;color:var(--acc);letter-spacing:0.05em}
.id-desc{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5}
#id-client{
  margin-top:10px;font-family:var(--font-mono);font-size:10px;
  padding:6px 10px;border:1px solid var(--amber-dim);
  background:rgba(255,183,0,0.05);color:var(--amber);
  display:none;
}

/* 스킬 액션 보드 */
#skill-board{
  flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;
  border-bottom:1px solid var(--border);overflow-y:auto;
}
#skill-board::-webkit-scrollbar{width:3px}
#skill-board::-webkit-scrollbar-thumb{background:var(--border)}

.sb-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.3em;color:var(--muted)}

/* 잠금 해제 연출 */
#skill-lock{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:8px;
}
.lock-icon{font-size:28px;opacity:0.3;animation:lockFloat 3s ease-in-out infinite}
.lock-msg{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center}

/* 타겟 선택 */
.target-select{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:12px;
  padding:8px 12px;outline:none;cursor:crosshair;appearance:none;
  transition:border-color 0.2s;
}
.target-select:focus{border-color:var(--acc)}
.target-select option{background:var(--bg2)}

/* 도박꾼 예측 버튼 */
.predict-group{display:flex;gap:6px}
.predict-btn{
  flex:1;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  padding:8px 4px;cursor:crosshair;text-align:center;transition:all 0.15s;
}
.predict-btn.selected{border-color:var(--acc);color:var(--acc);background:var(--acc-glow)}

/* CONFIRM 버튼 (지문 인식 스타일) */
#confirm-btn{
  width:100%;
  background:var(--acc);color:#000;
  border:none;font-family:var(--font-hud);font-size:11px;font-weight:700;
  letter-spacing:0.2em;padding:16px;cursor:crosshair;
  position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:all 0.1s;user-select:none;
}
#confirm-btn:disabled{background:var(--muted);cursor:not-allowed;color:var(--bg)}
#confirm-btn .fill{
  position:absolute;left:0;bottom:0;width:100%;height:0;
  background:rgba(0,0,0,0.3);transition:height 0s;
}
#confirm-btn.holding .fill{height:100%;transition:height 1.5s linear}
#confirm-btn.holding{animation:confirmPulse 0.3s ease-in-out infinite}
.confirm-label{position:relative;z-index:1}
#confirm-progress{
  position:absolute;bottom:0;left:0;height:3px;width:0;background:rgba(0,0,0,0.4);
  transition:width 0s;
}
#confirm-btn.holding #confirm-progress{width:100%;transition:width 1.5s linear}

/* 메모장 */
#notepad-wrap{padding:12px 16px 16px;display:flex;flex-direction:column;gap:6px}
.np-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.3em;color:var(--muted)}
#notepad{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:11px;
  padding:10px;resize:none;height:100px;outline:none;
  line-height:1.6;
  transition:border-color 0.2s;
}
#notepad:focus{border-color:var(--acc-dim)}

/* ── 투표 패널 (오버레이) ────────────────────────────────────── */
#vote-panel{
  position:fixed;inset:0;background:rgba(3,6,9,0.95);backdrop-filter:blur(6px);
  z-index:8000;display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:24px;
}
#vote-panel.open{display:flex}
.vote-title{font-family:var(--font-hud);font-size:18px;font-weight:700;color:var(--red);letter-spacing:0.1em}
.vote-subtitle{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
#vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;width:100%;max-width:800px}
.vote-card{
  border:1px solid var(--border);background:var(--bg2);padding:16px;
  cursor:crosshair;transition:all 0.15s;text-align:center;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
.vote-card:hover{border-color:var(--red);transform:translateY(-2px)}
.vote-card.voted{border-color:var(--red);background:rgba(255,34,68,0.08)}
.vote-card.me-voted{border-color:var(--muted);opacity:0.4;pointer-events:none}
.vc-name{font-family:var(--font-mono);font-size:13px;color:var(--text);margin-bottom:4px}
.vc-votes{font-family:var(--font-hud);font-size:20px;color:var(--red);text-shadow:0 0 10px rgba(255,34,68,0.4)}

/* ── 결과 오버레이 ──────────────────────────────────────────── */
#result-overlay{
  position:fixed;inset:0;background:rgba(3,6,9,0.97);
  z-index:9500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  animation:zoomIn 0.4s ease;
}
#result-overlay.open{display:flex}
.result-title{font-family:var(--font-hud);font-size:36px;font-weight:900;letter-spacing:0.1em;text-shadow:0 0 40px currentColor}
.result-title.mafia{color:var(--red)}
.result-title.citizen{color:var(--blue)}
.result-title.personal{color:var(--amber)}
.result-reason{font-family:var(--font-mono);font-size:13px;color:var(--muted)}
.result-roles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:600px}
.rr-item{font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--border);background:var(--bg2)}
.rr-item .rr-name{font-weight:700}
.rr-item.mafia-reveal{border-color:var(--red-dim);color:var(--red)}
.rr-item.citizen-reveal{border-color:var(--blue-dim);color:var(--blue)}
.rr-item.neutral-reveal{border-color:var(--amber-dim);color:var(--amber)}
.btn-lobby{
  font-family:var(--font-hud);font-size:12px;letter-spacing:0.15em;
  border:1px solid var(--acc);background:transparent;color:var(--acc);
  padding:12px 32px;cursor:crosshair;margin-top:8px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
.btn-lobby:hover{background:var(--acc-glow)}

/* ── 시스템 알림 팝업 ─────────────────────────────────────────── */
#sys-popup{
  position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--bg2);border:1px solid var(--acc-dim);
  font-family:var(--font-mono);font-size:12px;color:var(--acc);
  padding:10px 20px;z-index:8500;opacity:0;
  transition:all 0.3s;pointer-events:none;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  max-width:90vw;text-align:center;
}
#sys-popup.show{opacity:1;transform:translateX(-50%) translateY(0)}
#sys-popup.warn{border-color:var(--red-dim);color:var(--red)}
#sys-popup.success{border-color:rgba(0,255,136,0.3);color:var(--green)}

/* ── 모바일 오버레이 ──────────────────────────────────────────── */
@media(max-width:768px){
  #main{grid-template-columns:1fr}
  #player-grid{
    position:fixed;left:0;top:56px;bottom:0;width:80vw;max-width:300px;
    transform:translateX(-100%);transition:transform 0.3s;z-index:700;
  }
  #player-grid.open{transform:none}
  #hud{
    position:fixed;left:0;right:0;bottom:0;height:70vh;
    transform:translateY(100%);transition:transform 0.3s;z-index:700;
    border-left:none;border-top:1px solid var(--border);
  }
  #hud.open{transform:none}
  #chat-panel{grid-column:1}

  /* 모바일 하단 탭바 */
  #mobile-bar{
    position:fixed;bottom:0;left:0;right:0;height:52px;
    background:var(--bg2);border-top:1px solid var(--border);
    display:flex;z-index:600;
  }
  .mb-btn{
    flex:1;font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;
    border:none;background:transparent;color:var(--muted);cursor:crosshair;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  }
  .mb-btn.active{color:var(--acc)}
  .mb-icon{font-size:16px}
  #chat-panel{padding-bottom:52px}
}
@media(min-width:769px){#mobile-bar{display:none}}

/* ── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes targetPulse{0%,100%{box-shadow:0 0 8px var(--acc-glow)}50%{box-shadow:0 0 20px var(--acc-glow)}}
@keyframes confirmPulse{0%,100%{box-shadow:0 0 10px var(--acc-glow)}50%{box-shadow:0 0 25px var(--acc-glow)}}
@keyframes lockFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes zoomIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg{animation:fadeSlideIn 0.2s ease both}

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<script>
// ============================================================
//  GAME CLIENT
// ============================================================
const params    = new URLSearchParams(location.search);
const ROOM_ID   = params.get('room');
const MY_UID    = params.get('uid');
const MY_NICK   = decodeURIComponent(params.get('nick') || '');

if (!ROOM_ID || !MY_UID) {
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;font-family:'Share Tech Mono',monospace;background:#030609;color:#00c8ff;">
      <div style="font-size:28px;font-weight:900;letter-spacing:0.2em">MAFIA // PROTOCOL</div>
      <div style="font-size:13px;color:#3a5566">직접 접속은 불가합니다. 로비에서 입장하세요.</div>
      <a href="lobby.html" style="margin-top:8px;padding:12px 28px;border:1px solid #005f7a;color:#00c8ff;text-decoration:none;font-size:12px;letter-spacing:0.15em;">◀ 로비로 이동</a>
    </div>`;
  throw new Error('No room params');
}

let db, myRole = null, myTeam = null, myAlive = true;
let gameState   = null;
let currentTab  = 'all';
let chatUnsub   = null;
let gameUnsub   = null;
let timerInterval = null;
let confirmTimer  = null;
let selectedTarget1 = null, selectedTarget2 = null, selectedPrediction = null;
let tagMenu_targetUID = null;
let playerTags  = JSON.parse(localStorage.getItem('mafia_tags_' + ROOM_ID) || '{}');
let skipVotes   = new Set();
let myVote      = null;
let isHost      = false;

// ── 초기화 ──────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await new Promise(r => setTimeout(r, 400));
  try {
    db = window.db || firebase.database();
    if (!db) throw new Error('db null');
  } catch(e) { showSys('Firebase 연결 실패 — firebase-config.js를 확인하세요', 'warn'); return; }

  // 내 역할 구독
  db.ref('playerRoles/' + ROOM_ID + '/' + MY_UID).on('value', snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    myRole = data.role; myTeam = data.team;
    setTeamTheme(myTeam);
    renderIDCard(data);
    if (data.clientUID) renderClientInfo(data.clientUID);
  });

  // ── 룸 전체 구독 (게임 초기화 감지) ───────────────────
  let _initializing = false; // ★ 이중 초기화 방지 플래그
  db.ref('rooms/' + ROOM_ID).on('value', async snap => {
    if (!snap.exists()) { location.href = 'lobby.html'; return; }
    const room = snap.val();

    // 방장이고 status=playing인데 gameState가 없으면 → 게임 초기화
    if (room.status === 'playing' && !room.gameState && room.host === MY_UID) {
      if (_initializing) return; // 이미 초기화 중이면 스킵
      _initializing = true;
      showSys('게임 초기화 중...', '');
      try {
        // 인원 검증
        const players = Object.values(room.players || {});
        const count   = players.length;
        if (count < 6 || count > 13) {
          showSys(`인원 오류: ${count}명 (6~13명 필요)`, 'warn');
          _initializing = false;
          return;
        }
        await MafiaEngine.GameDB.startGame(db, ROOM_ID);
        showSys('게임 시작!', 'success');
      } catch(e) {
        showSys('초기화 오류: ' + e.message, 'warn');
        console.error('[초기화 오류]', e);
        _initializing = false; // 오류 시 재시도 허용
      }
    }
  });

  // ── 게임 상태 구독 ──────────────────────────────────────
  gameUnsub = db.ref('rooms/' + ROOM_ID + '/gameState');
  gameUnsub.on('value', snap => {
    if (!snap.exists()) return;
    const gs = snap.val();
    gameState = gs;

    // ★ UI 먼저 즉시 실행 (await 없이)
    myAlive = gs.assignments?.[MY_UID]?.alive !== false;
    renderPlayers(gs);
    updatePhaseUI(gs);
    checkGameOver(gs);

    // ★ playerRoles 복구는 백그라운드 (UI 블로킹 없음)
    if (isHost && gs.assignments) {
      (async () => {
        try {
          const myRoleSnap = await db.ref('playerRoles/' + ROOM_ID + '/' + MY_UID).get();
          if (!myRoleSnap.exists()) {
            showSys('직업 정보 복구 중...', '');
            for (const [uid, info] of Object.entries(gs.assignments)) {
              const roleData = {
                role:   info.role,
                team:   info.team,
                nameKo: MafiaEngine.ROLES[info.role]?.nameKo || info.role,
              };
              if (info.role === 'LAWYER' && gs.clientUID) roleData.clientUID = gs.clientUID;
              await db.ref('playerRoles/' + ROOM_ID + '/' + uid).set(roleData);
            }
            showSys('직업 정보 복구 완료', 'success');
          }
        } catch(e) { showSys('복구 오류: ' + e.message, 'warn'); }
      })();
    }

    // 사망 시 ghost 탭 표시
    if (!myAlive) {
      document.getElementById('tab-ghost').style.display = '';
      if (document.getElementById('tab-ghost').classList.contains('active') === false) {
        switchTab('ghost');
      }
    }
  });

  // ── 방장 여부 구독 (room.host 변경 감지) ────────────────
  db.ref('rooms/' + ROOM_ID + '/host').on('value', snap => {
    isHost = snap.val() === MY_UID;
    const abortBtn = document.getElementById('btn-abort');
    if (abortBtn) abortBtn.style.display = isHost ? '' : 'none';
  });

  // 개인 결과 메시지 구독
  db.ref('nightResults/' + ROOM_ID + '/' + MY_UID).on('value', snap => {
    if (!snap.exists()) return;
    const r = snap.val();
    if (!r || !r.type) return;
    handleNightResult(r);
  });

  // ★ 포섭 발생 감지 (전체 플레이어 대상 글리치 이펙트)
  db.ref('rooms/' + ROOM_ID + '/gameState/recruitUsed').on('value', snap => {
    if (!snap.exists() || snap.val() === 0) return;
    // 내가 포섭된 게 아닐 때만 글리치 효과
    db.ref('nightResults/' + ROOM_ID + '/' + MY_UID).get().then(r => {
      if (!r.exists() || r.val()?.type !== 'recruited') {
        if (window.SkillFX) SkillFX.RECRUIT_OTHERS();
      }
    });
  });

  // 채팅 구독
  subscribeChat();

  // ── 방장 주기적 체크 (Q9) ──────────────────────────────
  setInterval(() => { if (isHost && db) MafiaEngine.checkHostTransfer(db, ROOM_ID); }, 15000);

  // ── skipVotes 실시간 구독 ──────────────────────────────
  db.ref('rooms/' + ROOM_ID + '/skipVotes').on('value', snap => {
    if (!gameState || !gameState.assignments) return;
    gameState.skipVotes = snap.val() || {};
    updateSkipUI(gameState);
  });

  // ── 봇 관리: 3초마다 체크 ──────────────────────────────
  setInterval(() => {
    if (isHost && db && gameState && window.BotEngine) {
      BotEngine.manageBots(db, ROOM_ID).catch(e => console.warn('[bot]', e));
    }
  }, 3000);

  // ── 재연결 감지: Visibility API ─────────────────────────
  document.addEventListener('visibilitychange', async () => {
    if (document.hidden) return;
    // 탭 복귀 시 온라인 상태 갱신
    if (db && MY_UID) {
      await db.ref(`rooms/${ROOM_ID}/players/${MY_UID}/online`).set(true);
    }
    // Firebase 연결 상태 강제 갱신
    if (db) db.goOnline();
    showSys('재연결됨', 'success');
  });

  // ── 오프라인 감지 ────────────────────────────────────────
  window.addEventListener('offline', () => {
    showSys('⚠ 네트워크 끊김 — 재연결 대기 중...', 'warn');
  });
  window.addEventListener('online', async () => {
    showSys('네트워크 복구됨', 'success');
    if (db && MY_UID) {
      await db.ref(`rooms/${ROOM_ID}/players/${MY_UID}/online`).set(true);
    }
  });

  // 메모장 로컬 저장
  const saved = localStorage.getItem('mafia_note_' + ROOM_ID + '_' + MY_UID);
  if (saved) document.getElementById('notepad').value = saved;
  document.getElementById('notepad').addEventListener('input', e => {
    localStorage.setItem('mafia_note_' + ROOM_ID + '_' + MY_UID, e.target.value);
  });

  // 온라인 상태 관리
  db.ref('rooms/' + ROOM_ID + '/players/' + MY_UID + '/online').set(true);
  db.ref('rooms/' + ROOM_ID + '/players/' + MY_UID + '/online').onDisconnect().set(false);

  // Visibility API (Q9용 빠른 재연결)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      db.ref('rooms/' + ROOM_ID + '/players/' + MY_UID + '/online').set(true);
    }
  });

  // 키보드
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  // 태그 메뉴 닫기
  document.addEventListener('click', () => closeTagMenu());
  document.addEventListener('contextmenu', e => e.preventDefault());
});

// ── 플레이어 그리드 렌더 ─────────────────────────────────────
function renderPlayers(gs) {
  // ★ entries로 [uid, player] 쌍을 직접 가져옴 (역조회 버그 수정)
  const playerEntries = Object.entries(gs.assignments || {});
  const voteLog  = gs.voteLog || {};
  const voteTally = {};
  Object.values(voteLog).forEach(t => { voteTally[t] = (voteTally[t]||0)+1; });

  const container = document.getElementById('pg-cards');
  container.innerHTML = '';
  setTimeout(() => markBotPlayers(gs), 500);

  const aliveCount = playerEntries.filter(([,p]) => p.alive).length;
  document.getElementById('alive-count').textContent = 'ALIVE: ' + aliveCount;

  // ★ 닉네임 캐시 (한 번만 로드, 무한루프 방지)
  if (!window._nickCache) window._nickCache = {};
  if (Object.keys(window._nickCache).length === 0) {
    // 캐시가 비어있을 때만 DB 조회 (재호출 없음)
    db.ref('rooms/' + ROOM_ID + '/players').get().then(snap => {
      if (snap.exists()) {
        Object.entries(snap.val()).forEach(([uid, p]) => {
          window._nickCache[uid] = p.nickname || uid;
        });
        // ★ renderPlayers 재호출 없음 — 다음 gameState 업데이트 시 자동 반영
      }
    });
  }

  playerEntries.forEach(([uid, p]) => {
    const nick        = window._nickCache[uid] || uid;
    const isMe        = uid === MY_UID;
    const tag         = playerTags[uid];
    const voteCount   = voteTally[uid] || 0;
    const myVotedThis = voteLog[MY_UID] === uid;
    const isTargeted  = selectedTarget1 === uid || selectedTarget2 === uid;

    const card = document.createElement('div');
    card.className = 'p-card'
      + (!p.alive ? ' dead' : '')
      + (isMe ? ' me' : '')
      + (isTargeted ? ' targeted' : '')
      + (myVotedThis ? ' vote-target' : '');
    card.dataset.uid = uid;
    card.onclick = () => handlePlayerClick(uid, p.alive);
    card.oncontextmenu = (e) => { e.stopPropagation(); openTagMenu(e, uid); };

    const initial  = nick.charAt(0).toUpperCase();
    const isBot    = uid.startsWith('bot_');
    const tagHTML  = tag ? `<span class="pc-tag tag-${tag}">${{red:'🔴 마피아 의심',blue:'🔵 시민 확정',amber:'⚠️ 위험',clear:''}[tag]}</span>` : '';
    const voteHTML = gs.phase === 'vote' && voteCount > 0
      ? `<div class="pc-votes">${voteCount}</div>` : '';

    card.innerHTML = `
      <div class="pc-top">
        <div class="pc-avatar">${isBot ? '🤖' : initial}</div>
        <div class="pc-info">
          <div class="pc-name">${nick}${isMe?' <span style="color:var(--green);font-size:9px">YOU</span>':''}</div>
          <div class="pc-status">
            <span class="pc-wave ${isBot ? '' : 'offline'}"></span>
            <span>${p.alive ? (isBot ? 'BOT' : 'ONLINE') : '☠ DEAD'}</span>
          </div>
          ${tagHTML}
        </div>
      </div>
      ${voteHTML}`;

    container.appendChild(card);
  });
}

// ── 플레이어 클릭 (타겟 선택 / 투표) ────────────────────────
function handlePlayerClick(uid, alive) {
  if (!gameState) return;
  const phase = gameState.phase;

  if (phase === 'vote' && alive && uid !== MY_UID && myAlive) {
    submitVote(uid); return;
  }

  if (phase === 'night' && myAlive) {
    if (!selectedTarget1) {
      selectedTarget1 = uid;
    } else if (myRole === 'DETECTIVE' && !selectedTarget2 && uid !== selectedTarget1) {
      selectedTarget2 = uid;
    } else {
      selectedTarget1 = uid; selectedTarget2 = null;
    }
    updateSkillInputs();
    renderPlayers(gameState);
    checkConfirmReady();
  }
}

// ── Skip UI 업데이트 ─────────────────────────────────────
function updateSkipUI(gs) {
  if (!gs) return;
  const skipSnap  = gs.skipVotes || {};
  const skipCount = Object.keys(skipSnap).length;
  const alive     = gs.assignments
    ? Object.values(gs.assignments).filter(p => p.alive).length : 1;
  const need  = Math.ceil(alive / 2) + 1;
  const pct   = Math.min((skipCount / need) * 100, 100);

  const gauge   = document.getElementById('skip-gauge');
  const countEl = document.getElementById('skip-count');
  const needEl  = document.getElementById('skip-need');
  if (gauge)   gauge.style.width   = pct + '%';
  if (countEl) countEl.textContent = skipCount;
  if (needEl)  needEl.textContent  = need;

  // 과반수 달성 시 방장이 페이즈 진행
  if (skipCount >= need && isHost) {
    db.ref('rooms/' + ROOM_ID + '/skipVotes').remove();
    advancePhase(gameState);
  }
}

    if (isHost && window.BotEngine) {
      setTimeout(() => BotEngine.manageBots(db, ROOM_ID), 1000);
    }

function startTimer(endAt, gs) {
  clearInterval(timerInterval);
  const el = document.getElementById('phase-timer');

  // phaseEndAt 없거나 이미 지난 경우
  if (!endAt || endAt <= Date.now()) {
    el.textContent = '0:00';
    if (isHost) {
      (async () => {
        try { await advancePhase(gs); }
        catch(e) { console.error('[timer expire]', e); }
      })();
    }
    return;
  }

  timerInterval = setInterval(() => {
    const left = Math.max(0, endAt - Date.now());
    const s    = Math.ceil(left / 1000);
    const m    = Math.floor(s / 60);
    el.textContent = m + ':' + String(s % 60).padStart(2, '0');
    el.classList.toggle('urgent', s <= 10);
    if (s === 10) {
      if (window.SoundFX) SoundFX.bgmUrgent();
      setUrgentMode(true); // ★ UI 긴박 모드
    }
    if (s === 0) setUrgentMode(false);

    if (left <= 0) {
      clearInterval(timerInterval);
      if (isHost) {
        (async () => {
          // BotEngine 오류가 있어도 advancePhase는 반드시 실행
          try {
            if (window.BotEngine) await BotEngine.fillMissingActions(db, ROOM_ID);
          } catch(e) { console.warn('[Bot]', e); }
          try {
            await advancePhase(gs);
          } catch(e) { console.error('[advancePhase]', e); }
        })();
      }
    }
  }, 200);
}

// ── 페이즈 진행 (방장만) ─────────────────────────────────────
let _advancing = false; // 중복 실행 방지

async function advancePhase(gs) {
  if (!isHost || !db) { console.log('[advancePhase] skip: not host or no db'); return; }
  if (_advancing) { console.log('[advancePhase] skip: already advancing'); return; }
  if (!gs) gs = gameState;
  if (!gs) { console.log('[advancePhase] skip: no gameState'); return; }

  // Firebase에서 최신 phase 다시 확인 (캐시 오래됐을 수 있음)
  const freshSnap = await db.ref('rooms/' + ROOM_ID + '/gameState/phase').get();
  const freshPhase = freshSnap.val() || gs.phase;
  console.log('[advancePhase] phase:', freshPhase, 'day:', gs.day);

  _advancing = true;
  showSys('페이즈 전환 중...', '');

  try {
    if (freshPhase === 'night') {
      const nightRes = await MafiaEngine.GameDB.processNightActions(db, ROOM_ID);
      if (nightRes?.deadUID) {
        const deadNick = window._nickCache?.[nightRes.deadUID] || nightRes.deadUID;
        await addSystemMsg('💀 ' + deadNick + ' — 마피아에 의해 사망했습니다.', true, false);
      } else {
        await addSystemMsg('🌅 이 밤은 조용히 지나갔습니다.', false, false);
      }

    } else if (freshPhase === 'day') {
      await MafiaEngine.GameDB.processDayActions(db, ROOM_ID);
      await db.ref('rooms/' + ROOM_ID + '/gameState').update({
        phase:     'vote',
        phaseEndAt: Date.now() + (gs.dayTimer || 60) * 1000,
      });
      await db.ref('rooms/' + ROOM_ID + '/skipVotes').remove();
      await addSystemMsg('⚖️ 투표 시작 — 처형할 대상을 선택하세요.', false, true);

    } else if (freshPhase === 'vote') {
      const voteResult = await MafiaEngine.GameDB.processVoteResults(db, ROOM_ID);
      if (voteResult?.executed) {
        const execNick = window._nickCache?.[voteResult.executed] || voteResult.executed;
        await addSystemMsg('⚖️ ' + execNick + ' — 투표로 처형되었습니다.', true, false);
      } else {
        await addSystemMsg('🕊️ 아무도 처형되지 않았습니다.', false, false);
      }
      // phaseEndAt 누락 보완
      const chk = await db.ref('rooms/' + ROOM_ID + '/gameState/phaseEndAt').get();
      if (!chk.val()) {
        await db.ref('rooms/' + ROOM_ID + '/gameState/phaseEndAt')
          .set(Date.now() + (gs.nightTimer || 45) * 1000);
      }
    }

    await db.ref('rooms/' + ROOM_ID + '/skipVotes').remove();
    console.log('[advancePhase] done');

  } catch(e) {
    console.error('[advancePhase error]', e);
    showSys('⚠ 페이즈 오류: ' + e.message, 'warn');
  } finally {
    _advancing = false;
  }
}

  SHAMAN:    { label:'낮에만 사용 가능', actions:[], targets:0, isDayOnly:true },
};

let selectedAction = null;

function lockSkillBoard(msg) {
  document.getElementById('skill-lock').style.display = 'flex';
  document.getElementById('skill-active').style.display = 'none';
  document.querySelector('.lock-msg').textContent = msg;
}

function unlockSkillBoard(gs) {
  if (!gs) return;

  // myRole 미도착 시 최대 10회 재시도
  if (!myRole) {
    let retry = 0;
    const waitRole = setInterval(() => {
      retry++;
      if (myRole) { clearInterval(waitRole); unlockSkillBoard(gs); }
      else if (retry >= 10) { clearInterval(waitRole); lockSkillBoard('직업 로딩 중...'); }
    }, 300);
    return;
  }

  const info = SKILL_INFO[myRole];
  if (!info) { lockSkillBoard('알 수 없는 직업'); return; }

  // 첫날 밤(day=1)에는 보스 살해/포섭 UI 숨김, 나머지는 표시
  const isFirstNight = gs.day === 1;
  // 첫날 밤 보스는 포섭 가능 — UI 그대로 표시
  if (info.isPassive) { lockSkillBoard('패시브 직업 — 자동 발동'); return; }
  if (info.isDayOnly) { lockSkillBoard('낮에만 사용 가능'); return; }

  document.getElementById('skill-lock').style.display   = 'none';
  document.getElementById('skill-active').style.display = 'flex';
  document.getElementById('skill-active').style.flexDirection = 'column';
  document.getElementById('skill-active').style.gap = '12px';
  document.getElementById('skill-title').textContent = '// ' + info.label.toUpperCase();

  selectedTarget1 = null; selectedTarget2 = null;
  selectedPrediction = null; selectedAction = null;

  updateSkillInputs(gs);
  checkConfirmReady();
}

function updateSkillInputs(gs) {
  if (!myRole) return;
  const info = SKILL_INFO[myRole];
  if (!info) return;
  const container = document.getElementById('skill-inputs');
  container.innerHTML = '';

  const currentGs = gs || gameState;
  if (!currentGs || !currentGs.assignments) return;
  const alivePlayers = Object.entries(currentGs.assignments)
    .filter(([uid, p]) => p.alive && uid !== MY_UID)
    .map(([uid]) => uid);

  // 행동 선택 (보스)
  if (info.actions.length > 1) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:4px';
    info.actions.forEach(a => {
      const btn = document.createElement('button');
      btn.className = 'predict-btn' + (selectedAction === a.id ? ' selected' : '');
      btn.textContent = a.label;
      btn.onclick = () => { selectedAction = a.id; updateSkillInputs(); checkConfirmReady(); };
      row.appendChild(btn);
    });
    container.appendChild(row);
  } else if (info.actions.length === 1) {
    selectedAction = info.actions[0].id;
  }

  // 타겟 선택 (닉네임 캐시 사용 — DB 조회 없이 즉시 렌더)
  if (info.targets >= 1) {
    const nickMap = window._nickCache || {};

    const sel = document.createElement('select');
    sel.className = 'target-select';
    sel.innerHTML = '<option value="">— 타겟 1 선택 —</option>' +
      alivePlayers.map(uid => `<option value="${uid}" ${selectedTarget1===uid?'selected':''}>${nickMap[uid]||uid}</option>`).join('');
    sel.onchange = e => { selectedTarget1 = e.target.value || null; checkConfirmReady(); };
    container.appendChild(sel);

    if (info.targets >= 2) {
      const sel2 = document.createElement('select');
      sel2.className = 'target-select';
      sel2.innerHTML = '<option value="">— 타겟 2 선택 —</option>' +
        alivePlayers.map(uid => `<option value="${uid}" ${selectedTarget2===uid?'selected':''}>${nickMap[uid]||uid}</option>`).join('');
      sel2.onchange = e => { selectedTarget2 = e.target.value || null; checkConfirmReady(); };
      container.appendChild(sel2);
    }
  }

  // 도박꾼 예측
  if (info.isPrediction) {
    const group = document.createElement('div');
    group.className = 'predict-group';
    [['death','밤 사망'],['execution','낮 처형'],['peace','평화']].forEach(([val,label]) => {
      const btn = document.createElement('button');
      btn.className = 'predict-btn' + (selectedPrediction === val ? ' selected' : '');
      btn.textContent = label;
      btn.onclick = () => { selectedPrediction = val; updateSkillInputs(); checkConfirmReady(); };
      group.appendChild(btn);
    });
    container.appendChild(group);
  }
}

function checkConfirmReady() {
  const btn  = document.getElementById('confirm-btn');
  const info = myRole ? SKILL_INFO[myRole] : null;
  if (!info || !btn) return;

  let ready = false;
  if (info.isPrediction)        ready = !!selectedPrediction;
  else if (info.targets === 0)  ready = false;
  else if (info.targets === 1)  ready = !!selectedTarget1 && !!selectedAction;
  else if (info.targets === 2)  ready = !!selectedTarget1 && !!selectedTarget2 && selectedTarget1 !== selectedTarget2;

  btn.disabled = !ready;
  if (ready) btn.querySelector('.confirm-label').textContent = '▶ HOLD TO CONFIRM';
}

// HOLD TO CONFIRM
let holdTimer = null, holdStart = 0;
function startConfirm() {
  const btn = document.getElementById('confirm-btn');
  if (btn.disabled) return;
  btn.classList.add('holding');
  holdStart = Date.now();
  holdTimer = setTimeout(() => { executeSkill(); btn.classList.remove('holding'); }, 1500);
}
function cancelConfirm() {
  clearTimeout(holdTimer);
  document.getElementById('confirm-btn').classList.remove('holding');
}

async function executeSkill() {
  if (!gameState || !myRole) return;
  const info = SKILL_INFO[myRole];

  let actionData = {};
  if (info.isPrediction)       actionData = { prediction: selectedPrediction };
  else if (info.targets === 1) actionData = { action: selectedAction, target1: selectedTarget1 };
  else if (info.targets === 2) actionData = { action: selectedAction, target1: selectedTarget1, target2: selectedTarget2 };

  // ★ 스킬 이펙트 + 사운드 실행
  if (window.SkillFX && window.SoundFX) {
    if (myRole === 'DETECTIVE') {
      SkillFX.play('DETECTIVE', selectedTarget1, selectedTarget2);
    } else if (myRole === 'BOSS') {
      SkillFX.play('BOSS', selectedTarget1, selectedAction === 'recruit' ? 'recruit' : 'kill');
    } else if (myRole === 'GAMBLER') {
      SkillFX.play('GAMBLER', selectedPrediction);
    } else if (selectedTarget1) {
      SkillFX.play(myRole, selectedTarget1);
    }
  }

  await MafiaEngine.GameDB.submitNightAction(db, ROOM_ID, MY_UID, actionData);
  lockSkillBoard('능력 사용 완료. 결과 대기 중...');
  showSys('✅ 행동 제출 완료', 'success');
}

// ── 투표 ─────────────────────────────────────────────────────
async function submitVote(targetUID) {
  myVote = targetUID;
  await MafiaEngine.GameDB.submitVote(db, ROOM_ID, MY_UID, targetUID);
  renderPlayers(gameState);
  showSys('투표 완료');
}

function renderVotePanel(gs) {
  const grid    = document.getElementById('vote-grid');
  const voteLog = gs.voteLog || {};
  const tally   = {};
  Object.values(voteLog).forEach(t => { tally[t] = (tally[t]||0)+1; });

  db.ref('rooms/' + ROOM_ID + '/players').get().then(snap => {
    const nickMap = {};
    if (snap.exists()) Object.entries(snap.val()).forEach(([uid, p]) => { nickMap[uid] = p.nickname || uid; });

    const alive = Object.entries(gs.assignments).filter(([,p]) => p.alive && Object.keys(gs.assignments).find(k=>gs.assignments[k]===p)!==MY_UID);

    grid.innerHTML = Object.entries(gs.assignments)
      .filter(([uid, p]) => p.alive && uid !== MY_UID)
      .map(([uid]) => {
        const voted    = voteLog[MY_UID] === uid;
        return `<div class="vote-card${voted?' voted':''}" onclick="submitVote('${uid}')">
          <div class="vc-name">${nickMap[uid]||uid}</div>
          <div class="vc-votes">${tally[uid]||0}</div>
        </div>`;
      }).join('');
  });
}

// ── Skip (방장 즉시 / 일반 투표) ────────────────────────────
async function voteSkip() {
  if (!gameState || !db) return;
  if (isHost) {
    // 방장은 즉시 페이즈 진행
    showSys('⏭ 방장 스킵');
    await advancePhase(gameState);
  } else {
    // 일반 플레이어는 투표
    if (!myAlive) return;
    await db.ref('rooms/' + ROOM_ID + '/skipVotes/' + MY_UID).set(true);
    showSys('스킵 투표 완료');
  }
}

// ── 채팅 ─────────────────────────────────────────────────────
function subscribeChat() {
  if (chatUnsub) { db.ref('chats/' + ROOM_ID).off('value', chatUnsub); }
  db.ref('chats/' + ROOM_ID).limitToLast(100)
    .on('value', snap => {
      const msgs = [];
      snap.forEach(c => msgs.push({ id:c.key, ...c.val() }));
      renderChat(msgs);
    });
}

function renderChat(msgs) {
  const log = document.getElementById('chat-log');
  const isBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 60;

  const phase   = gameState?.phase || 'day';
  const visible = getVisibleChannels();

  log.innerHTML = msgs
    .filter(m => visible.includes(m.channel))
    .filter(m => {
      if (currentTab === 'system')  return m.channel === 'system';
      if (currentTab === 'faction') return m.channel === 'mafia';
      if (currentTab === 'ghost')   return m.channel === 'ghost';
      return true; // 'all'
    })
    .map(m => {
      if (m.channel === 'system') {
        const cls = m.warn ? 'warn' : (m.success ? 'success' : (m.amber ? 'amber' : ''));
        return `<div class="msg system ${cls}">[SYS] ${m.text}<span class="msg-time">${formatTime(m.timestamp)}</span></div>`;
      }
      const isMe  = m.uid === MY_UID;
      const isMaf = m.channel === 'mafia';
      const isGhost = m.channel === 'ghost';
      return `<div class="msg chat${isMe?' me':''}${isMaf?' mafia-msg':''}${isGhost?' ghost-msg':''}">
        <span class="sender">${m.nickname||'?'}</span>
        <span class="body">${escHtml(m.text)}</span>
        <span class="msg-time">${formatTime(m.timestamp)}</span>
      </div>`;
    }).join('');

  if (isBottom) log.scrollTop = log.scrollHeight;
}

function getVisibleChannels() {
  const channels = ['system', 'main'];
  if (!myAlive) channels.push('ghost');
  if (myTeam === 'mafia') channels.push('mafia');
  return channels;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || !db) return;

  const ch = getSendChannel();
  if (!ch) { showSys('이 페이즈에는 채팅할 수 없습니다.', 'warn'); return; }

  await db.ref('chats/' + ROOM_ID).push({
    uid: MY_UID, nickname: MY_NICK, text, channel: ch,
    timestamp: Date.now(),
  });
  input.value = '';
}

function getSendChannel() {
  if (!myAlive) return 'ghost';
  if (currentTab === 'faction' && myTeam === 'mafia') return 'mafia';
  return 'main';
}

function quickPing(text) {
  document.getElementById('chat-input').value = text;
  sendChat();
}

function switchTab(tab) {
  currentTab = tab;
  ['all','system','faction','ghost'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t === tab);
  });
  if (gameState) subscribeChat();
}

// ── 시스템 메시지 Firebase 저장 ───────────────────────────────
async function addSystemMsg(text, warn = false, success = false) {
  if (!db) return;
  try {
    await db.ref('chats/' + ROOM_ID).push({
      uid: 'SYSTEM', nickname: 'SYSTEM',
      text, channel: 'system',
      warn, success,
      timestamp: Date.now(),
    });
  } catch(e) { console.warn('[addSystemMsg]', e); }
}

// ── 야간 결과 처리 ────────────────────────────────────────────
function handleNightResult(r) {
  const msgs = {
    scan:          `[경찰] ${r.target} 조사 결과: ${r.result}`,
    relation:      `[탐정] ${r.t1} ↔ ${r.t2} 관계: ${r.result}`,
    watch:         `[감시자] ${r.target} 동선 수신. 방문: ${(r.visitedBy||[]).join(',')||'없음'} / 방문자: ${(r.visitors||[]).join(',')||'없음'}`,
    archive:       `[기록관] ${r.log}`,
    hacked:        `[해커] ${r.target} 감청 성공`,
    hack_fail:     `[해커] 감청 실패: ${r.msg}`,
    protected:     `✅ ${r.msg}`,
    killed:        `💀 ${r.msg}`,
    executed:      `⚖️ ${r.msg}`,
    recruited:     `🔴 ${r.msg}`,
    recruit_success:`✅ ${r.msg}`,
    inherit:       `📋 ${r.msg}`,
    guard_success: `🛡️ 군인 방어 성공!`,
    soldier_revive:`💪 ${r.msg}`,
    gambler_win:   `🎰 ${r.msg}`,
    gambler_fail:  `🎰 ${r.msg}`,
    client_killed: `⚖️ ${r.msg}`,
    client_recruited:`⚖️ ${r.msg}`,
    shaman:        `🔮 ${r.msg}`,
    error:         `⚠️ ${r.msg}`,
  };
  const text = msgs[r.type] || r.msg || r.type;
  const warn = ['killed','executed','error','gambler_fail','hack_fail'].includes(r.type);
  const success = ['protected','recruit_success','guard_success','gambler_win','soldier_revive','inherit'].includes(r.type);

  addSystemMsg(text, warn, success);
  showSys(text, warn?'warn':(success?'success':''));

  // 포섭 당하면 테마 변경
  if (r.type === 'recruited') {
    myTeam = 'mafia'; myRole = 'KILLER';
    setTeamTheme('mafia');
    // ★ 고퀄리티 포섭 이펙트
    setTimeout(() => {
      if (window.SkillFX) SkillFX.RECRUITED();
    }, 300);
  }
}

// ── 포섭 이펙트 ───────────────────────────────────────────────
function showRecruitedEffect() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:99000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background 0.3s;pointer-events:none';
  document.body.appendChild(overlay);
  setTimeout(() => { overlay.style.background = 'rgba(80,0,0,0.85)'; }, 50);

  const text = document.createElement('div');
  text.style.cssText = 'font-family:var(--font-hud);font-size:clamp(24px,5vw,48px);font-weight:900;color:#ff2244;text-shadow:0 0 40px rgba(255,34,68,0.8);letter-spacing:0.1em;text-align:center;animation:zoomIn 0.3s ease';
  text.textContent = '당신은 포섭되었습니다.';
  overlay.appendChild(text);

  setTimeout(() => { overlay.style.background = 'rgba(0,0,0,0)'; }, 2000);
  setTimeout(() => overlay.remove(), 2500);
}

// ── 게임 오버 ────────────────────────────────────────────────
function checkGameOver(gs) {
  if (!gs.winResult) return;
  const r = gs.winResult;
  const overlay = document.getElementById('result-overlay');
  const titleEl = document.getElementById('result-title');
  const reasonEl = document.getElementById('result-reason');
  const rolesEl  = document.getElementById('result-roles');

  const winnerMap = { mafia:'마피아 진영 승리', citizen:'시민 진영 승리', personal:'개인 승리' };
  titleEl.textContent = winnerMap[r.winner] || r.winner;
  titleEl.className   = 'result-title ' + r.winner;
  reasonEl.textContent = r.reason || '';

  // 전원 직업 공개
  const assigns = gs.assignments;
  // 닉네임 가져와서 결과 표시
  db.ref('rooms/' + ROOM_ID + '/players').get().then(snap => {
    const rp = snap.val() || {};
    rolesEl.innerHTML = Object.entries(assigns).map(([uid, p]) => {
      const cls  = p.team + '-reveal';
      const nick = rp[uid]?.nickname || uid;
      const isBot = rp[uid]?.isBot ? ' 🤖' : '';
      return `<div class="rr-item ${cls}"><span class="rr-name">${nick}${isBot}</span> — ${MafiaEngine.ROLES[p.role]?.nameKo||p.role}</div>`;
    }).join('');
  });

  // 개인 승리자
  if (r.lawyerWin) {
    const li = document.createElement('div');
    li.className = 'rr-item neutral-reveal';
    li.innerHTML = `⚖️ <b>${r.lawyerWin.uid}</b> — ${r.lawyerWin.reason}`;
    rolesEl.appendChild(li);
  }
  if (r.gamblerWin) {
    r.gamblerWin.forEach(g => {
      const li = document.createElement('div');
      li.className = 'rr-item neutral-reveal';
      li.innerHTML = `🎰 <b>${g.uid}</b> — ${g.reason}`;
      rolesEl.appendChild(li);
    });
  }

  overlay.classList.add('open');
}

// ── Role Tracker ─────────────────────────────────────────────
function toggleRoleTracker() {
  const el = document.getElementById('role-tracker');
  el.classList.toggle('open');
  if (el.classList.contains('open') && gameState) renderRoleTracker(gameState);
}

function renderRoleTracker(gs) {
  const grid  = document.getElementById('rt-grid');
  const table = MafiaEngine.ROLE_TABLE[Object.keys(gs.assignments).length];
  if (!table) return;

  const allRoles = [...table.mafia, ...table.neutral, ...table.citizen];
  const deadRoles = Object.values(gs.assignments).filter(p=>!p.alive).map(p=>p.role);

  grid.innerHTML = allRoles.map(role => {
    const r   = MafiaEngine.ROLES[role];
    const dead = deadRoles.includes(role);
    return `<div class="rt-item ${dead?'dead':''}">
      <div class="rt-dot ${r.team}"></div>
      <span>${r.nameKo}</span>
    </div>`;
  }).join('');
}

// ── 태그 시스템 ──────────────────────────────────────────────
let tagTargetUID = null;
function openTagMenu(e, uid) {
  tagTargetUID = uid;
  const menu = document.getElementById('tag-menu');
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight - 160) + 'px';
}
function closeTagMenu() {
  document.getElementById('tag-menu').style.display = 'none';
}
function setTag(tag) {
  if (!tagTargetUID) return;
  if (tag === 'clear') delete playerTags[tagTargetUID];
  else playerTags[tagTargetUID] = tag;
  localStorage.setItem('mafia_tags_' + ROOM_ID, JSON.stringify(playerTags));
  if (gameState) renderPlayers(gameState);
  closeTagMenu();
}

// ── Abort ────────────────────────────────────────────────────
async function confirmAbort() {
  if (!isHost) return;
  if (!confirm('게임을 강제 종료하시겠습니까?')) return;
  await db.ref('rooms/' + ROOM_ID + '/status').set('aborted');
  goLobby();
}

// ── 모바일 탭 ────────────────────────────────────────────────
let _currentMobileTab = 'chat';

function mobileTab(tab) {
  // 같은 탭 다시 누르면 닫기
  if (_currentMobileTab === tab && tab !== 'chat') {
    closeMobilePanel();
    return;
  }
  _currentMobileTab = tab;

  const isPanel = tab === 'players' || tab === 'hud';
  document.getElementById('player-grid').classList.toggle('open', tab === 'players');
  document.getElementById('hud').classList.toggle('open', tab === 'hud');
  document.getElementById('mobile-overlay').classList.toggle('show', isPanel);
  document.getElementById('mobile-close').classList.toggle('show', isPanel);

  document.querySelectorAll('.mb-btn').forEach((b, i) => {
    b.classList.toggle('active', ['players','chat','hud'][i] === tab);
  });
}

function closeMobilePanel() {
  _currentMobileTab = 'chat';
  document.getElementById('player-grid').classList.remove('open');
  document.getElementById('hud').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('show');
  document.getElementById('mobile-close').classList.remove('show');
  // 채팅 버튼 활성화
  document.querySelectorAll('.mb-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 1);
  });
}

// ── 유틸 ─────────────────────────────────────────────────────
function goLobby() { location.href = 'lobby.html'; }

// ── PWA 설치 ────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 모바일에서만 프롬프트 표시
  if (window.innerWidth < 768) {
    setTimeout(() => {
      document.getElementById('pwa-prompt').classList.add('show');
    }, 30000); // 30초 후 표시
  }
});

async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwa-prompt').classList.remove('show');
}

// ── 연결 상태 모니터링 ───────────────────────────────────
let connectionLost = false;
function monitorConnection() {
  if (!db) return;
  const connRef = db.ref('.info/connected');
  connRef.on('value', snap => {
    const connected = snap.val();
    const banner = document.getElementById('reconnect-banner');
    if (!connected) {
      connectionLost = true;
      banner.classList.add('show');
    } else {
      if (connectionLost) {
        connectionLost = false;
        banner.classList.remove('show');
        // 재연결 시 온라인 상태 갱신
        db.ref(`rooms/${ROOM_ID}/players/${MY_UID}/online`).set(true);
        showSys('✅ 재연결 완료', 'success');
      }
    }
  });
}

// ── 타이머 긴박 시 UI 강조 ───────────────────────────────
function setUrgentMode(on) {
  document.querySelectorAll('.p-card').forEach(c => {
    c.classList.toggle('urgent-mode', on);
  });
  if (on && window.SoundFX) SoundFX.bgmUrgent();
}

// ── 봇 모드 카드 표시 ────────────────────────────────────
function markBotPlayers(gs) {
  if (!gs?.assignments) return;
  document.querySelectorAll('.p-card').forEach(card => {
    const uid = card.dataset.uid;
    if (!uid) return;
    // 오프라인이면 BOT 표시
    db.ref(`rooms/${ROOM_ID}/players/${uid}/online`).get().then(snap => {
      const online = snap.val() !== false;
      card.classList.toggle('bot-mode', !online && gs.assignments[uid]?.alive);
    });
  });
}

let sysTimer;
function showSys(msg, type='') {
  const el = document.getElementById('sys-popup');
  el.textContent = msg;
  el.className   = 'show' + (type ? ' ' + type : '');
  clearTimeout(sysTimer);
  sysTimer = setTimeout(() => el.className = '', 3500);
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
