<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Engine Test // MAFIA PROTOCOL</title>
<style>
  body { background:#030609; color:#c8dce8; font-family:'Courier New',monospace; padding:32px; font-size:13px; }
  h1 { color:#00c8ff; font-size:18px; letter-spacing:0.2em; margin-bottom:24px; }
  h2 { color:#ffb700; font-size:13px; letter-spacing:0.15em; margin:24px 0 8px; border-bottom:1px solid #0e2233; padding-bottom:6px; }
  .pass { color:#00ff88; } .fail { color:#ff2244; } .info { color:#aaa; }
  pre { background:#070d12; border:1px solid #0e2233; padding:16px; overflow-x:auto; line-height:1.6; margin:8px 0; }
  button { background:#00c8ff; color:#000; border:none; padding:10px 24px; font-family:inherit; font-size:13px; cursor:pointer; letter-spacing:0.1em; margin:4px; }
  button:hover { background:#33d4ff; }
  .badge { display:inline-block; padding:2px 8px; font-size:11px; margin:2px; }
  .mafia   { background:rgba(255,34,68,0.2);  color:#ff2244; border:1px solid #6e0f1d; }
  .citizen { background:rgba(0,200,255,0.1);  color:#00c8ff; border:1px solid #005f7a; }
  .neutral { background:rgba(255,183,0,0.1);  color:#ffb700; border:1px solid #5a3f00; }
</style>
</head>
<body>
<h1>// MAFIA ENGINE — 로직 테스트</h1>

<button onclick="testRoleAssignment()">직업 배분 테스트</button>
<button onclick="testNightProcessing()">밤 행동 처리 테스트</button>
<button onclick="testRecruitLogic()">포섭 로직 테스트</button>
<button onclick="testWinCondition()">승리 조건 테스트</button>
<button onclick="runAllTests()">전체 테스트 실행</button>

<div id="output"></div>

<script src="game-engine.js"></script>
<script>
const out = document.getElementById('output');

function log(html) { out.innerHTML += html; }
function section(title) { log(`<h2>${title}</h2>`); }
function pass(msg) { log(`<div class="pass">✅ ${msg}</div>`); }
function fail(msg) { log(`<div class="fail">❌ ${msg}</div>`); }
function info(msg) { log(`<div class="info">   ${msg}</div>`); }
function pre(obj)  { log(`<pre>${JSON.stringify(obj, null, 2)}</pre>`); }

// ── 테스트 1: 직업 배분 ─────────────────────────────────────
function testRoleAssignment() {
  section('1. 직업 배분 테스트');
  const { assignRoles, ROLE_TABLE } = window.MafiaEngine;

  [6,7,8,9,10,11,12,13].forEach(n => {
    const uids = Array.from({length:n}, (_,i) => `player${i+1}`);
    try {
      const result = assignRoles(uids);
      const table  = ROLE_TABLE[n];
      const roles  = Object.values(result).map(p => p.role);

      const mafiaCount   = roles.filter(r => ['BOSS','HACKER'].includes(r)).length;
      const expectedMafia = table.mafia.length;
      const totalCorrect  = roles.length === n;
      const mafiaCorrect  = mafiaCount === expectedMafia;

      if (totalCorrect && mafiaCorrect) {
        pass(`${n}인: 배분 정상 (마피아 ${mafiaCount}명)`);
        const badges = roles.map(r => {
          const team = window.MafiaEngine.ROLES[r].team;
          return `<span class="badge ${team}">${window.MafiaEngine.ROLES[r].nameKo}</span>`;
        }).join('');
        log(`<div style="margin:4px 0">${badges}</div>`);
      } else {
        fail(`${n}인: 배분 오류`);
      }
    } catch(e) { fail(`${n}인: ${e.message}`); }
  });
}

// ── 테스트 2: 밤 행동 처리 ──────────────────────────────────
function testNightProcessing() {
  section('2. 밤 행동 처리 테스트');
  const { createGameState, processNight } = window.MafiaEngine;

  // 8인 게임 시뮬레이션
  const mockRoom = {
    players: {
      p1: { uid:'p1', nickname:'보스맨',   online:true },
      p2: { uid:'p2', nickname:'해커킹',   online:true },
      p3: { uid:'p3', nickname:'경찰관',   online:true },
      p4: { uid:'p4', nickname:'의사선생', online:true },
      p5: { uid:'p5', nickname:'취준생',   online:true },
      p6: { uid:'p6', nickname:'탐정장',   online:true },
      p7: { uid:'p7', nickname:'도박꾼',   online:true },
      p8: { uid:'p8', nickname:'정치인',   online:true },
    },
    dayTimer: 90, nightTimer: 45
  };

  const gs = createGameState(mockRoom);
  info(`게임 상태 생성 완료 — ${Object.keys(gs.assignments).length}인`);

  // 역할 출력
  const roleInfo = Object.entries(gs.assignments).map(([uid, p]) =>
    `${uid}: ${window.MafiaEngine.ROLES[p.role].nameKo}(${p.team})`
  ).join(', ');
  info(roleInfo);

  // 킬러(포섭 전이므로 보스가 직접) 찾기
  const bossUID   = Object.keys(gs.assignments).find(u => gs.assignments[u].role === 'BOSS');
  const doctorUID = Object.keys(gs.assignments).find(u => gs.assignments[u].role === 'DOCTOR');
  const policeUID = Object.keys(gs.assignments).find(u => gs.assignments[u].role === 'POLICE');

  // 시민 중 아무나 타겟
  const citizenUID = Object.keys(gs.assignments).find(u =>
    gs.assignments[u].team === 'citizen' && u !== doctorUID && u !== policeUID
  );

  // 밤 행동 설정
  gs.nightActions = {
    [bossUID]:   { action: 'kill',   target1: citizenUID },
    [doctorUID]: { action: 'heal',   target1: citizenUID }, // 의사가 보호
    [policeUID]: { action: 'scan',   target1: bossUID },
  };

  const { gameState: newGS, results } = processNight(gs);

  // 의사가 보호했으니 살해 안 됨
  const targetAlive = newGS.assignments[citizenUID]?.alive;
  targetAlive
    ? pass(`의사 보호 정상 작동 — ${citizenUID} 생존`)
    : fail(`의사 보호 실패 — ${citizenUID} 사망`);

  // 경찰 보스 스캔 — 은신으로 시민 결과
  const policeResult = results[policeUID];
  policeResult?.result === '시민'
    ? pass(`경찰 스캔 — 보스 은신 정상 작동 (결과: 시민)`)
    : fail(`보스 은신 오류: ${policeResult?.result}`);

  info(`페이즈 전환: ${gs.phase} → ${newGS.phase}`);
}

// ── 테스트 3: 포섭 로직 ─────────────────────────────────────
function testRecruitLogic() {
  section('3. 포섭 로직 테스트');
  const { createGameState, processNight } = window.MafiaEngine;

  const mockRoom = {
    players: Object.fromEntries(
      Array.from({length:9}, (_,i) => [`p${i+1}`, { uid:`p${i+1}`, nickname:`P${i+1}`, online:true }])
    ),
    dayTimer: 90, nightTimer: 45
  };

  let gs = createGameState(mockRoom);
  const bossUID     = Object.keys(gs.assignments).find(u => gs.assignments[u].role === 'BOSS');
  const jobseekerUID = Object.keys(gs.assignments).find(u => gs.assignments[u].role === 'JOBSEEKER');
  const targetUID   = Object.keys(gs.assignments).find(u =>
    gs.assignments[u].team === 'citizen' && u !== jobseekerUID
  );

  const targetOriginalRole = gs.assignments[targetUID].role;
  info(`포섭 대상: ${targetUID} (${window.MafiaEngine.ROLES[targetOriginalRole].nameKo})`);
  info(`취업준비생: ${jobseekerUID}`);

  gs.nightActions = {
    [bossUID]: { action: 'recruit', target1: targetUID }
  };

  const { gameState: newGS, results } = processNight(gs);

  // 포섭 성공 확인
  const recruited = newGS.assignments[targetUID]?.role === 'KILLER';
  recruited
    ? pass(`포섭 성공 — ${targetUID}가 킬러로 변환`)
    : fail(`포섭 실패`);

  // 취업준비생 승계 확인
  const inherited = newGS.assignments[jobseekerUID]?.role === targetOriginalRole;
  inherited
    ? pass(`직업 승계 성공 — 취업준비생이 ${window.MafiaEngine.ROLES[targetOriginalRole].nameKo} 승계`)
    : fail(`직업 승계 실패 (현재: ${newGS.assignments[jobseekerUID]?.role})`);

  // 포섭 시 살해 잠금 확인
  const killLocked = !results[targetUID]?.type?.includes('killed');
  killLocked
    ? pass(`포섭 시 살해 잠금 정상`)
    : fail(`포섭 시 살해 잠금 실패`);

  // 연속 포섭 방지 테스트
  newGS.nightActions = {
    [bossUID]: { action: 'recruit', target1: targetUID }
  };
  const { results: results2 } = processNight(newGS);
  results2[bossUID]?.type === 'error'
    ? pass(`연속 포섭 차단 정상`)
    : fail(`연속 포섭 차단 실패`);
}

// ── 테스트 4: 승리 조건 ─────────────────────────────────────
function testWinCondition() {
  section('4. 승리 조건 테스트');
  const { checkWinCondition } = window.MafiaEngine;

  // 시민 전멸
  const gs1 = { assignments: {
    a: { alive:true,  team:'mafia' },
    b: { alive:false, team:'citizen' },
    c: { alive:false, team:'citizen' },
  }, gamblerSuccess:{} };
  const r1 = checkWinCondition(gs1);
  r1?.winner === 'mafia' ? pass(`시민 전멸 → 마피아 승리`) : fail(`시민 전멸 판정 오류: ${r1?.winner}`);

  // 마피아 전멸
  const gs2 = { assignments: {
    a: { alive:false, team:'mafia' },
    b: { alive:true,  team:'citizen' },
    c: { alive:true,  team:'citizen' },
  }, gamblerSuccess:{} };
  const r2 = checkWinCondition(gs2);
  r2?.winner === 'citizen' ? pass(`마피아 전멸 → 시민 승리`) : fail(`마피아 전멸 판정 오류`);

  // 마피아 수 우세
  const gs3 = { assignments: {
    a: { alive:true, team:'mafia' },
    b: { alive:true, team:'mafia' },
    c: { alive:true, team:'citizen' },
  }, gamblerSuccess:{} };
  const r3 = checkWinCondition(gs3);
  r3?.winner === 'mafia' ? pass(`마피아 수 우세 → 마피아 승리`) : fail(`마피아 수 우세 판정 오류`);

  // 게임 진행 중
  const gs4 = { assignments: {
    a: { alive:true, team:'mafia' },
    b: { alive:true, team:'citizen' },
    c: { alive:true, team:'citizen' },
    d: { alive:true, team:'citizen' },
  }, gamblerSuccess:{} };
  const r4 = checkWinCondition(gs4);
  r4 === null ? pass(`진행 중 → null 반환`) : fail(`진행 중 판정 오류: ${r4?.winner}`);
}

// ── 전체 실행 ───────────────────────────────────────────────
function runAllTests() {
  out.innerHTML = '';
  testRoleAssignment();
  testNightProcessing();
  testRecruitLogic();
  testWinCondition();
  section('테스트 완료');
  log('<div class="pass" style="font-size:15px;margin-top:8px">🎉 모든 테스트 실행 완료</div>');
}

// 자동 실행
window.onload = runAllTests;
</script>
</body>
</html>
