<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 웹게임: 사이버 수사 스릴러</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* ==========================================
           사이버펑크 테마 및 애니메이션 CSS
           ========================================== */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body { 
            background-color: #050505; color: #e0e0e0; 
            font-family: 'Share Tech Mono', 'Courier New', monospace; 
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); 
            overflow-x: hidden; user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #050505; } 
        ::-webkit-scrollbar-thumb { background: #008b8b; border-radius: 3px; }

        .glass-panel { 
            background: rgba(10, 15, 20, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            border: 1px solid rgba(0, 255, 255, 0.15); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); 
        }

        .neon-text-blue { text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #00b3ff; color: #ccffff; }
        .neon-text-red { text-shadow: 0 0 5px #f00, 0 0 10px #f00, 0 0 20px #ff0040; color: #ffcccc; }
        
        /* 테마별 동적 컬러 */
        .theme-MAFIA { border-color: rgba(255, 0, 0, 0.4) !important; box-shadow: inset 0 0 20px rgba(255,0,0,0.1) !important; }
        .theme-CITIZEN { border-color: rgba(0, 255, 255, 0.4) !important; box-shadow: inset 0 0 20px rgba(0,255,255,0.05) !important; }
        .theme-NEUTRAL { border-color: rgba(245, 158, 11, 0.4) !important; box-shadow: inset 0 0 20px rgba(245,158,11,0.1) !important; }

        .nixie-font { font-family: 'Impact', sans-serif; letter-spacing: 0.1em; }
        .chat-msg { animation: fadeIn 0.3s ease-out; }
        
        /* 글리치 애니메이션 */
        .glitch-hover:hover { animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; background-color: rgba(0, 255, 255, 0.2); }
        .glitch-anim { animation: glitch-skew 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        @keyframes glitch-skew { 0% { transform: skew(0deg); } 20% { transform: skew(-5deg); filter: hue-rotate(90deg); } 40% { transform: skew(5deg); } 60% { transform: skew(-2deg); } 80% { transform: skew(2deg); filter: hue-rotate(-90deg); } 100% { transform: skew(0deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 포섭 발생 시 핏빛 화면 오버레이 */
        #vfx-overlay { pointer-events: none; position: fixed; inset: 0; z-index: 9999; opacity: 0; transition: opacity 0.1s; }
        .blood-screen {
            background: radial-gradient(circle, transparent 20%, rgba(150, 0, 0, 0.8) 90%, rgba(255, 0, 0, 0.9) 100%);
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.8);
            animation: screenShake 0.5s cubic-bezier(.36,.07,.19,.97) both, bloodFade 4s ease-out forwards;
        }
        .glass-crack {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 11px), 
                              repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(255,0,0,0.2) 20px, rgba(255,0,0,0.2) 22px);
        }
        @keyframes screenShake { 10%, 90% { transform: translate3d(-5px, 0, 0) scale(1.02); } 20%, 80% { transform: translate3d(5px, 0, 0) scale(1.02); } 30%, 50%, 70% { transform: translate3d(-10px, 10px, 0) scale(1.05); } 40%, 60% { transform: translate3d(10px, -10px, 0) scale(1.05); } }
        @keyframes bloodFade { 0% { opacity: 1; filter: contrast(200%) brightness(150%); } 10% { opacity: 0.8; } 100% { opacity: 0; display: none; } }
        
        /* [추가4] 페이즈 전환 오버레이 CSS */
        #phase-overlay { pointer-events: none; position: fixed; inset: 0; z-index: 9998; opacity: 0; transition: opacity 1s, background 1s; }
        .phase-day { background: rgba(0, 255, 255, 0.3); animation: flash 1s ease-out; }
        .phase-night { background: rgba(100, 0, 200, 0.3); animation: flash 1s ease-out; }

        /* 타겟 호버 이펙트 */
        .target-hover-mafia:hover { box-shadow: inset 0 0 0 2px #f00; cursor: crosshair; }
        .target-hover-police:hover { box-shadow: inset 0 0 0 2px #0ff; cursor: cell; }
        .target-hover-doctor:hover { box-shadow: inset 0 0 0 2px #0f0; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 lg:p-4">

    <!-- 시각 효과 오버레이 -->
    <div id="phase-overlay"></div>
    <div id="vfx-overlay"></div>

    <div id="app" class="w-full max-w-7xl h-[95vh] flex flex-col justify-center transition-all duration-500">
        <div class="glass-panel p-10 rounded-xl text-center max-w-lg mx-auto text-cyan-200">
            <h2 class="text-xl font-bold mb-4 animate-pulse">SYSTEM BOOTING...</h2>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 0. 사이버펑크 오디오 엔진 (Web Audio API)
        // ==========================================
        const CyberAudio = {
            ctx: null, bgmOsc: null, bgmGain: null, bgmInterval: null,
            init: function() { 
                if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
                if(this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone: function(freq, type, duration, vol, detune=0) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); osc.detune.value = detune;
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            playClick: function() { this.playTone(800, 'square', 0.05, 0.1); },
            playError: function() { this.playTone(150, 'sawtooth', 0.2, 0.2); this.playTone(100, 'sawtooth', 0.3, 0.2, 100); },
            playScan: function() { this.playTone(1200, 'sine', 0.1, 0.05); setTimeout(()=>this.playTone(2400, 'sine', 0.2, 0.05), 100); },
            playGunshot: function() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(100, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playGlassCrack: function() {
                if(!this.ctx) return;
                const bufferSize = this.ctx.sampleRate * 0.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
                const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0.8, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                noise.connect(gain); gain.connect(this.ctx.destination); noise.start();
                
                setTimeout(() => this.playTone(50, 'sine', 0.4, 1), 500);
                setTimeout(() => this.playTone(50, 'sine', 0.4, 1), 900);
            },
            playPhaseTransition: function(isDay) {
                if(!this.ctx) return;
                if(isDay) {
                    this.playTone(400, 'sine', 0.5, 0.1); setTimeout(()=>this.playTone(600, 'sine', 1.0, 0.1), 300);
                } else {
                    this.playTone(300, 'sawtooth', 0.5, 0.1); setTimeout(()=>this.playTone(150, 'sawtooth', 1.0, 0.1), 300);
                }
            },
            setBGM: function(type) {
                if(!this.ctx) return;
                if(this.bgmInterval) clearInterval(this.bgmInterval);
                if(this.bgmOsc) { try{this.bgmOsc.stop();}catch(e){} this.bgmOsc.disconnect(); this.bgmOsc = null; }
                if(this.bgmGain) { this.bgmGain.disconnect(); this.bgmGain = null; }
                
                if (type === 'stop') return;

                this.bgmOsc = this.ctx.createOscillator();
                this.bgmGain = this.ctx.createGain();
                this.bgmOsc.connect(this.bgmGain);
                this.bgmGain.connect(this.ctx.destination);
                
                if (type === 'day') {
                    this.bgmOsc.type = 'sine'; this.bgmOsc.frequency.value = 110; this.bgmGain.gain.value = 0.03; this.bgmOsc.start();
                    this.bgmInterval = setInterval(() => { this.playTone(800, 'square', 0.02, 0.01); }, 1000);
                } else if (type === 'night') {
                    this.bgmOsc.type = 'sawtooth'; this.bgmOsc.frequency.value = 55; this.bgmGain.gain.value = 0.02; this.bgmOsc.start();
                    let freq = 55; let up = true;
                    this.bgmInterval = setInterval(() => {
                        freq += up ? 1 : -1; if(freq > 65) up = false; if(freq < 45) up = true;
                        if(this.bgmOsc) this.bgmOsc.frequency.linearRampToValueAtTime(freq, this.ctx.currentTime + 0.5);
                    }, 500);
                } else if (type === 'recruit') {
                    this.bgmOsc.type = 'square'; this.bgmOsc.frequency.value = 40; this.bgmGain.gain.value = 0.05; this.bgmOsc.start();
                    this.bgmInterval = setInterval(() => {
                        this.playTone(60, 'sine', 0.2, 0.8); setTimeout(() => this.playTone(60, 'sine', 0.2, 0.8), 200);
                    }, 800);
                }
            }
        };

        // ==========================================
        // 1. 직업 데이터베이스 (기획안 V5.0)
        // ==========================================
        const ROLES_DB = {
            BOSS: { id: 'BOSS', name: '보스', faction: 'MAFIA', type: 'MAFIA', desc: '시민 1명을 킬러로 포섭합니다. (연속 사용 불가) 스캔 시 시민으로 위장됩니다.', actionName: '포섭 시도' },
            HACKER: { id: 'HACKER', name: '해커', faction: 'MAFIA', type: 'MAFIA', desc: '조사직(경찰 등)의 시스템 메시지를 훔쳐봅니다.', actionName: '정보 해킹' },
            KILLER: { id: 'KILLER', name: '킬러', faction: 'MAFIA', type: 'MAFIA', desc: '매일 밤 유저 1명을 제거합니다. (포섭으로 생성됨)', actionName: '살해' },
            GAMBLER: { id: 'GAMBLER', name: '도박꾼', faction: 'NEUTRAL', type: 'NEUTRAL', desc: '사망자를 예측하여 다음 날 밤 무작위 정보를 얻습니다.', actionName: '사망 베팅' },
            LAWYER: { id: 'LAWYER', name: '변호사', faction: 'NEUTRAL', type: 'NEUTRAL', desc: '의뢰인 혹은 타겟을 보호하여 조사를 시민으로 왜곡합니다.', actionName: '비밀 유지' },
            POLICE: { id: 'POLICE', name: '경찰', faction: 'CITIZEN', type: 'INFO', desc: '유저 1명이 마피아인지 스캔합니다.', actionName: '정체 스캔' },
            DOCTOR: { id: 'DOCTOR', name: '의사', faction: 'CITIZEN', type: 'DEFENSE', desc: '유저 1명을 살해로부터 응급 치료합니다.', actionName: '응급 처치' },
            JOBSEEKER: { id: 'JOBSEEKER', name: '취업준비생', faction: 'CITIZEN', type: 'DEFENSE', desc: '포섭된 자의 원래 직업을 즉시 계승합니다. (자동 발동)' },
            POLITICIAN: { id: 'POLITICIAN', name: '정치인', faction: 'CITIZEN', type: 'VAR', desc: '투표권 2개, 낮 처형 면제권을 가집니다. (패시브)' },
            ARCHIVIST: { id: 'ARCHIVIST', name: '기록관', faction: 'CITIZEN', type: 'INFO', desc: '유저 1명의 과거 동선을 확인합니다.', actionName: '기록 열람' },
            SOLDIER: { id: 'SOLDIER', name: '군인', faction: 'CITIZEN', type: 'DEFENSE', desc: '경계 대상을 보호하거나 본인 습격 시 1회 생존합니다.', actionName: '초소 경계' },
            DETECTIVE: { id: 'DETECTIVE', name: '탐정', faction: 'CITIZEN', type: 'INFO', desc: '유저 2명의 관계 기류를 파악합니다.', actionName: '관계 분석' },
            SHAMAN: { id: 'SHAMAN', name: '무당', faction: 'CITIZEN', type: 'INFO', desc: '낮에 사망자 1명의 직업을 확인합니다.', actionName: '혼령 교신' },
            WATCHMAN: { id: 'WATCHMAN', name: '감시자', faction: 'CITIZEN', type: 'INFO', desc: '유저 1명의 밤 행동 대상자 로그를 확인합니다.', actionName: '정밀 관측' },
            CITIZEN: { id: 'CITIZEN', name: '시민', faction: 'CITIZEN', type: 'BASIC', desc: '특수 능력이 없는 평범한 시민입니다.' }
        };

        function getRolePool(count) {
            const pools = {
                6: ['BOSS', 'GAMBLER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'POLITICIAN'],
                7: ['BOSS', 'LAWYER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'ARCHIVIST', 'SOLDIER'],
                8: ['BOSS', 'HACKER', 'GAMBLER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'DETECTIVE', 'POLITICIAN'],
                9: ['BOSS', 'HACKER', 'LAWYER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'ARCHIVIST', 'SHAMAN', 'WATCHMAN'],
                10: ['BOSS', 'HACKER', 'LAWYER', 'GAMBLER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'SOLDIER', 'DETECTIVE', 'POLITICIAN'],
                11: ['BOSS', 'HACKER', 'LAWYER', 'GAMBLER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'ARCHIVIST', 'WATCHMAN', 'SHAMAN', 'SOLDIER'],
                12: ['BOSS', 'HACKER', 'LAWYER', 'GAMBLER', 'POLICE', 'DOCTOR', 'JOBSEEKER', 'ARCHIVIST', 'DETECTIVE', 'WATCHMAN', 'SOLDIER', 'POLITICIAN'],
                13: ['BOSS', 'HACKER', 'LAWYER', 'GAMBLER', 'POLICE', 'DETECTIVE', 'WATCHMAN', 'SHAMAN', 'ARCHIVIST', 'DOCTOR', 'SOLDIER', 'JOBSEEKER', 'POLITICIAN']
            };
            return pools[count] || Array(count).fill('CITIZEN');
        }

        // ==========================================
        // 2. 파이어베이스 초기화 및 전역 상태
        // ==========================================
        let isLocalMock = false; let app, auth, db, appId;

        try {
            let config = null;
            if (typeof __firebase_config !== 'undefined') config = JSON.parse(__firebase_config);
            if (!config || Object.keys(config).length === 0) throw new Error("No Config");
            app = initializeApp(config); auth = getAuth(app); db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'mafia-v5';
        } catch (e) { isLocalMock = true; console.log("로컬 가상 모드로 가동됩니다."); }

        let state = 'INIT';
        let currentUser = null;
        let currentRoomId = new URLSearchParams(window.location.search).get('room');
        let roomData = null;
        
        let timerInterval = null;
        let isTransitioning = false;
        let currentChatTab = 'ALL'; 
        let previousRole = null; 
        let previousPhase = null; 

        const appDiv = document.getElementById('app');
        const vfxDiv = document.getElementById('vfx-overlay');

        window.showToast = (msg, color = 'text-cyan-200 border-cyan-500/50') => {
            const toast = document.createElement('div');
            toast.className = `glass-panel ${color} px-6 py-3 rounded shadow-lg border text-sm transition-opacity z-50`;
            toast.innerText = `> SYSTEM: ${msg}`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
        };

        function triggerGlitch(elementId) {
            const el = document.getElementById(elementId);
            if(el) { el.classList.remove('glitch-anim'); void el.offsetWidth; el.classList.add('glitch-anim'); }
        }

        function triggerPhaseVFX(isDay) {
            CyberAudio.playPhaseTransition(isDay);
            CyberAudio.setBGM(isDay ? 'day' : 'night');
            const po = document.getElementById('phase-overlay');
            if(po) {
                po.className = isDay ? 'phase-day' : 'phase-night';
                po.style.opacity = '1';
                setTimeout(() => { po.style.opacity = '0'; po.className = ''; }, 1000);
            }
        }

        function triggerRecruitVFX() {
            CyberAudio.playGlassCrack();
            CyberAudio.setBGM('recruit'); 
            vfxDiv.className = 'blood-screen glass-crack';
            vfxDiv.style.opacity = '1';
            setTimeout(() => { vfxDiv.style.opacity = '0'; vfxDiv.className = ''; }, 4000);
        }

        async function authenticate() {
            if (isLocalMock) return;
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
        }

        async function joinRoom(nickname) {
            if (isLocalMock) {
                currentRoomId = "LOCAL_HQ"; currentUser = { uid: "local_user_01" };
                roomData = { status: 'lobby', hostId: "local_user_01", players: { "local_user_01": { nickname: nickname, joinedAt: Date.now(), isHost: true, isAlive: true } }, messages: [], votes: {}, actions: {} };
                state = 'LOBBY'; render(); showToast("UI 전용 모드 접속 성공"); return;
            }

            if (!currentUser) return;
            if (!currentRoomId) { currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase(); window.history.pushState({}, '', `?room=${currentRoomId}`); }

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const roomSnap = await getDoc(roomRef);
            const playerData = { nickname, joinedAt: Date.now(), isHost: false, isAlive: true };

            if (!roomSnap.exists()) {
                playerData.isHost = true;
                await setDoc(roomRef, { status: 'lobby', hostId: currentUser.uid, createdAt: Date.now(), players: { [currentUser.uid]: playerData }, messages: [], votes: {}, actions: {} });
            } else {
                const payload = {}; payload[`players.${currentUser.uid}`] = playerData; await updateDoc(roomRef, payload);
            }

            onSnapshot(roomRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const prevStatus = roomData?.status;
                    roomData = data;
                    if (!roomData.messages) roomData.messages = [];
                    if (!roomData.votes) roomData.votes = {};
                    if (!roomData.actions) roomData.actions = {};
                    
                    if (roomData.status === 'playing' && prevStatus === 'lobby') { 
                        state = 'PLAYING'; CyberAudio.playScan(); 
                        previousPhase = roomData.phase;
                        triggerPhaseVFX(roomData.phase === 'day');
                    }
                    if (roomData.status === 'end' && prevStatus === 'playing') { 
                        state = 'END'; CyberAudio.playTone(400, 'sawtooth', 1, 0.2); CyberAudio.setBGM('stop');
                    }
                    
                    render();
                    
                    if (state === 'PLAYING') {
                        if (previousPhase && previousPhase !== roomData.phase) {
                            triggerPhaseVFX(roomData.phase === 'day');
                        }
                        previousPhase = roomData.phase;
                        
                        if (roomData.players[currentUser.uid]) {
                            const currentRole = roomData.players[currentUser.uid].role;
                            if (previousRole && previousRole !== 'KILLER' && currentRole === 'KILLER') {
                                triggerRecruitVFX();
                            }
                            previousRole = currentRole;
                        }
                    }

                    setTimeout(() => { const chatBox = document.getElementById('chat-box'); if(chatBox) chatBox.scrollTop = chatBox.scrollHeight; }, 50);
                }
            });
            state = 'LOBBY'; render();
        }

        window.updateSettings = async () => {
            if (roomData.hostId !== currentUser.uid) return;
            const maxPlayers = parseInt(document.getElementById('setting-max-players').value) || 13;
            const dayTime = parseInt(document.getElementById('setting-day-time').value) || 60;
            const nightTime = parseInt(document.getElementById('setting-night-time').value) || 45;
            const settings = { maxPlayers, dayTime, nightTime };
            if (isLocalMock) { roomData.settings = settings; render(); }
            else { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId), { settings }); }
        };

        window.addBot = async () => {
            CyberAudio.playClick();
            if (roomData.hostId !== currentUser.uid) return;
            const maxP = roomData.settings?.maxPlayers || 13;
            if (Object.keys(roomData.players).length >= maxP) {
                showToast(`최대 참가 인원(${maxP}명)에 도달했습니다.`, "border-red-500 text-red-300");
                return;
            }
            const botNames = ["Alpha", "Beta", "Gamma", "Delta", "Epsilon", "Zeta", "Eta", "Theta", "Iota", "Kappa", "Lambda", "Mu", "Nu"];
            const existingNames = Object.values(roomData.players).map(p => p.nickname);
            let bName = "Bot_" + Math.floor(Math.random()*1000);
            for(let n of botNames) { if(!existingNames.includes(n + "_Bot")) { bName = n + "_Bot"; break; } }

                            <div class="glass-panel p-4 rounded-xl flex flex-col h-full ${themeClass}">
                                <div class="bg-black/60 border border-gray-700 rounded-lg p-4 mb-4 relative overflow-hidden group">
                                    <div class="absolute -right-6 -top-6 opacity-5 group-hover:opacity-10 transition-opacity"><svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1zM4 4h3a3 3 0 006 0h3a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm2.5 7a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm2.45 4a2.5 2.5 0 10-4.9 0h4.9zM12 9a1 1 0 100 2h3a1 1 0 100-2h-3zm-1 4a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg></div>
                                    <p class="text-[10px] text-gray-500 tracking-widest mb-1">IDENTITY CARD</p>
                                    <h2 class="text-2xl font-bold ${myRole.faction==='MAFIA'?'text-red-400 glitch-anim':(myRole.faction==='NEUTRAL'?'text-amber-400':'text-cyan-400')} tracking-wider mb-2">${myRole.name}</h2>
                                    <span class="text-[10px] px-2 py-0.5 rounded border border-gray-600 opacity-80 uppercase bg-black/50">${myRole.faction}</span>
                                    <p class="text-xs text-gray-300 mt-3 leading-relaxed break-keep">${myRole.desc}</p>
                                    ${myRole.id === 'LAWYER' ? `<p class="text-xs text-amber-300 mt-2 font-bold">[비밀 의뢰인: ${roomData.players[myData.lawyerClient]?.nickname || '없음'}]</p>` : ''}
                                    ${myRole.id === 'GAMBLER' ? `<p class="text-xs text-amber-300 mt-2 font-bold">[예측 성공: ${myData.gamblerSuccess || 0} / 3회]</p>` : ''}
                                </div>
                                
                                <!-- [Phase 3] 디지털 메모장 추가 -->
                                <div class="bg-black/40 border border-gray-800 rounded-lg p-3 mb-4">
                                    <p class="text-[10px] text-gray-500 tracking-widest mb-1 flex justify-between">PRIVATE NOTEPAD <span class="text-cyan-700">로컬 저장</span></p>
                                    <textarea id="private-memo" class="w-full bg-transparent border-none text-xs text-gray-400 focus:text-cyan-200 focus:outline-none resize-none h-16" placeholder="수사 메모를 기록하십시오... (자신만 볼 수 있음)" onchange="localStorage.setItem('mafia_memo_' + currentRoomId, this.value)">${localStorage.getItem('mafia_memo_' + currentRoomId) || ''}</textarea>
                                </div>

                                <div class="flex-1 border border-gray-700 bg-gray-900/50 rounded-lg p-4 flex flex-col items-center">
                                    <h3 class="text-xs font-bold text-gray-400 tracking-widest mb-1 border-b border-gray-700 pb-2 w-full text-center">ACTION BOARD</h3>
                                    ${(function() {
                                        if (state === 'END') return `<p class="text-amber-500 font-bold text-center mt-6 glitch-anim">OPERATION TERMINATED</p>`;
                                        if (isDay) {
                                            if (myRole.id === 'SHAMAN' && myData.isAlive) {
                                                const deadOptions = Object.entries(roomData.players).filter(([id, p]) => !p.isAlive).map(([id, p]) => `<option value="${id}">${p.nickname}</option>`).join('');
                                                const usedToday = roomData.shamanUsed && roomData.shamanUsed[roomData.dayCount] === currentUser.uid;
                                                if (deadOptions && !usedToday) return `<div class="w-full flex flex-col gap-2 mt-2"><p class="text-[10px] text-purple-400 text-center">망자의 원혼이 떠돌고 있습니다.</p><select id="shaman-target" class="w-full bg-gray-900 border border-purple-700 text-purple-200 rounded p-2 text-sm focus:border-purple-500 outline-none"><option value="">-- 사망자 선택 --</option>${deadOptions}</select><button onclick="submitShamanAction()" class="w-full mt-2 py-2 bg-purple-900 hover:bg-purple-800 border border-purple-500 text-purple-100 font-bold rounded transition-colors text-xs">혼령 교신 (낮 1회)</button></div>`;
                                                if (usedToday) return `<p class="text-xs text-green-400 text-center mt-6">오늘의 교신을 완료했습니다.</p>`;
                                            }
                                            return `<p class="text-xs text-cyan-500 text-center mt-6 glitch-anim">낮 시간입니다.<br>좌측 모니터에서 타겟을 클릭해<br>투표권을 행사하십시오.</p>`;
                                        } else {
                                            if (!myData.isAlive) return `<p class="text-xs text-gray-500 text-center mt-6">사망하여 행동할 수 없습니다.</p>`;
                                            if (!myRole.actionName) return `<p class="text-xs text-gray-400 text-center mt-6">밤에 사용할 수 있는<br>액티브 스킬이 없습니다.</p>`;
                                            if (roomData.actions && roomData.actions[currentUser.uid]) return `<p class="text-xs text-green-400 text-center mt-6 border border-green-800 p-2 rounded bg-green-900/20 glitch-anim">스킬 데이터 입력 완료.<br>아침을 기다리세요.</p>`;
                                            
                                            // [Phase 2] 직업별 타겟 옵션 동적 생성
                                            let targetOptions = '';
                                            if (myRole.id === 'GAMBLER') targetOptions = Object.entries(roomData.players).filter(([id, p]) => p.isAlive).map(([id, p]) => `<option value="${id}">${p.nickname} (사망/처형 예측)</option>`).join('');
                                            else if (myRole.id === 'ARCHIVIST') targetOptions = Object.entries(roomData.players).filter(([id, p]) => id !== currentUser.uid).map(([id, p]) => `<option value="${id}">${p.nickname} (과거 기록 열람)</option>`).join('');
                                            else targetOptions = Object.entries(roomData.players).filter(([id, p]) => p.isAlive && id !== currentUser.uid).map(([id, p]) => `<option value="${id}">${p.nickname}</option>`).join('');
                                            
                                            return `
                                                <div class="w-full flex flex-col gap-2 mt-2">
                                                    <label class="text-[10px] text-cyan-500">${myRole.actionName} 대상 선택:</label>
                                                    <select id="action-target-1" class="w-full bg-gray-900 border border-gray-700 text-cyan-200 rounded p-2 text-sm focus:border-cyan-500 outline-none">
                                                        <option value="">-- 타겟 선택 --</option>
                                                        ${targetOptions}
                                                    </select>
                                                    ${myRole.id === 'DETECTIVE' ? `
                                                    <select id="action-target-2" class="w-full bg-gray-900 border border-gray-700 text-cyan-200 rounded p-2 text-sm focus:border-cyan-500 outline-none mt-1">
                                                        <option value="">-- 비교 타겟 2 선택 --</option>
                                                        ${targetOptions}
                                                    </select>` : ''}
                                                    <button onclick="submitAction()" class="w-full mt-4 py-3 bg-cyan-900 hover:bg-cyan-800 border border-cyan-500 text-cyan-100 font-bold rounded flex justify-center items-center gap-2 transition-colors">
                                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                                                        CONFIRM ACTION
                                                    </button>
                                                </div>
                                            `;
                                        }
                                    })()}
                                </div>
                            </div>
                        </div>
                    </div>
                    ${guideModalHtml}
                `;
                if(state === 'PLAYING') startTimerDisplay();
            }
        }

        if (!isLocalMock) { onAuthStateChanged(auth, (user) => { if (user) currentUser = user; }); }
        render();
    </script>
</body>
</html>
